<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#050c16" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EPLPredict" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="AI-powered Premier League 2026/27 predictions, live scores and sweepstake." />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>EPL 2026/27 Predictor</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html {
        background: #050c16;
        height: 100%;
      }
      body {
        background: #070e1a;
        min-height: 100vh;
        min-height: 100dvh;
        width: 100%;
        overflow-x: hidden;
        overscroll-behavior-y: none;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        background: #070e1a;
        min-height: 100vh;
        min-height: 100dvh;
        width: 100%;
      }
      /* Fills the notch / status-bar strip with the topbar colour
         so nothing looks clipped or transparent on iPhone. */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: env(safe-area-inset-top);
        background: #050c16;
        z-index: 100;
      }
      input, select, textarea { font-size: 16px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
